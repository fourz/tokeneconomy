name: TokenEconomy
version: '${project.version}'
api-version: 1.21
description: This is a simple Bukkit Plugin
author: fourz

depends: [Vault]
softdepend: [RVNKCore]

main: org.fourz.tokeneconomy.TokenEconomy

commands:
  balance:
    description: Check your balance
    usage: /balance
    aliases: [bal,tokens,money]    
  pay:
    description: Pay another player
    usage: /pay <player> <amount>     
  economy:  
    description: Gives or sets an amount from the ether.
    aliases: [eco]
    usage: /economy give|set|pay|top <player> [<amount>]
  top:
    description: Display the top balances
    usage: /top
    aliases: [leaderboard]
    permission: tokeneconomy.top

permissions:
  # ── Player commands ───────────────────────────────────────────────────────
  tokeneconomy.balance:
    description: Check own balance
    default: true
  tokeneconomy.top:
    description: View the top balances leaderboard
    default: true

  # ── Staff commands ────────────────────────────────────────────────────────
  tokeneconomy.balance.others:
    description: View another player's balance
    default: op
  tokeneconomy.balance.*:
    description: All balance permissions (self + others)
    default: op
  tokeneconomy.pay:
    description: Transfer tokens to another player
    default: false
  tokeneconomy.set:
    description: Set a player's balance
    default: op
  tokeneconomy.add:
    description: Add tokens to a player's balance
    default: op

  # ── Admin — general ───────────────────────────────────────────────────────
  tokeneconomy.admin:
    description: Catch-all admin access
    default: op
  tokeneconomy.debug:
    description: Access debug commands and diagnostics
    default: op
  tokeneconomy.admin.seed:
    description: Seed test data into the database
    default: op

  # ── Wildcard ──────────────────────────────────────────────────────────────
  tokeneconomy.*:
    description: All TokenEconomy permissions
    default: op